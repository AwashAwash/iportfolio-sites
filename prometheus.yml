global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['0']

  - job_name: 'jenkins'
    metrics_path: /prometheus
    static_configs:
      - targets: [']  

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['']
